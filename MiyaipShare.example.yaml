mixed-port: 7890
allow-lan: false
mode: rule
log-level: info

proxies:
  - name: MiyaIP
    type: socks5
    server: direct.miyaip.online
    port: 8001
    username: YOUR_USERNAME
    password: YOUR_PASSWORD
    udp: true

proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - MiyaIP

rules:
  - MATCH,Proxy
